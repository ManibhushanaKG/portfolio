<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: deep black fading into rich violet -->
    <radialGradient id="bgGrad" cx="32%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="45%" stop-color="#160b28"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </radialGradient>

    <!-- Violet glow ring -->
    <radialGradient id="glowRing" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="92%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Letter gradient: violet sheen across the monogram -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#D8B4FE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Base circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Soft glow ring for depth -->
  <circle cx="256" cy="256" r="256" fill="url(#glowRing)"/>

  <!-- Thin violet edge ring -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Monogram -->
  <text
    x="50%"
    y="53%"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="200"
    letter-spacing="-4"
    fill="url(#letterGrad)"
    filter="url(#softShadow)">MB</text>
</svg>
